name: CD (Build + Deploy)

on:
  push:
    branches: [master]
    paths:
      - 'astro-app/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: planappgovpt/planapp-top10-produtividade
  APP_NAME: planapp-top10-produtividade

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          # Só para o flux image automation detetar (semver pattern vX.Y.Z)
          TAG="v0.0.${{ github.run_number }}"
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astro-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: astro-app/package-lock.json
      - run: npm ci
      - run: npm run lint || true
      - run: npm run typecheck || true
      - run: npm run build

  build:
    needs: [tag, ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./astro-app
          file: ./astro-app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.image_tag }}
          build-args: |
            SUPPORT_SCHEMAS_URL=${{ secrets.SUPPORT_SCHEMAS_URL }}
            DATABASE_URL=${{ secrets.SUPPORT_SCHEMAS_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Print image tag
        run: |
          echo "Built image \"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.image_tag }}\""
          echo ""
          echo "Flux Image Automation vai atualizar o deployment automaticamente (~1 min)."
          echo "Flux ImageUpdateAutomation monitora GHCR e faz commit no monorepo branch staging."
