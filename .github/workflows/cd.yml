name: CD (Build + Deploy)

on:
  push:
    branches: [master]
    paths:
      - 'astro-app/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: planappgovpt/planapp-top10-produtividade
  APP_NAME: planapp-top10-produtividade

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          TAG="v$(date +%Y.%m.%d)-${{ github.run_number }}"
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint || true
      - run: npm run typecheck || true
      - run: npm run build

  build:
    needs: [tag, ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./astro-app
          file: ./astro-app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.image_tag }}
          build-args: |
            SUPPORT_SCHEMAS_URL=${{ secrets.SUPPORT_SCHEMAS_URL }}
            DATABASE_URL=${{ secrets.SUPPORT_SCHEMAS_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Print image tag
        run: echo "Built image \"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.image_tag }}\""

  deploy:
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout monorepo k8s
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: PLANAPPGOVPT/planapp-emcgc-monorepo
          ref: staging
          path: monorepo

      - name: Update image tag in deployment
        run: |
          TAG="${{ needs.tag.outputs.image_tag }}"
          FILE="monorepo/k8s/apps/produtividade-staging/deployment.yaml"
          sed -i "s|image: ghcr.io/${{ env.IMAGE_NAME }}:.*|image: ghcr.io/${{ env.IMAGE_NAME }}:${TAG}|" "$FILE"
          echo "Updated deployment to tag: $TAG"
          grep "image:" "$FILE"

      - name: Commit and push
        working-directory: monorepo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add k8s/apps/produtividade-staging/deployment.yaml
          git diff --staged --quiet || git commit -m "chore(k8s): bump ${{ env.APP_NAME }} to ${{ needs.tag.outputs.image_tag }}"
          git push origin staging

      - name: Trigger Flux reconcile
        # The monorepo has Flux GitRepository watching staging branch
        # Changes are picked up automatically within ~60 seconds
        run: |
          echo "Waiting for Flux to reconcile..."
          echo 'Run on k3s: flux reconcile kustomization planapp-staging'
          echo "Or verify with: curl https://produtividade-medidas.planapp.gov.pt/api/health"
