name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag da imagem a promover'
        required: true

env:
  REGISTRY: ghcr.io
  HEALTHCHECK_URL: https://produtividade-staging.planapp.gov.pt/api/health

jobs:
  deploy:
    runs-on: [self-hosted, Linux, ARM64]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to runner
        run: |
          mkdir -p /opt/produtividade-staging
          cp docker-compose.staging.yml /opt/produtividade-staging/
          cp vm/nginx/staging.conf /opt/produtividade-staging/

      - name: Deploy
        working-directory: /opt/produtividade-staging
        run: |
          echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" > .env
          echo "SUPPORT_SCHEMAS_URL=${{ secrets.SUPPORT_SCHEMAS_URL }}" >> .env
          docker compose -f docker-compose.staging.yml pull
          docker compose -f docker-compose.staging.yml up -d --remove-orphans

      - name: Install nginx config
        run: |
          sudo cp /opt/produtividade-staging/staging.conf /etc/nginx/sites-available/produtividade-staging.planapp.gov.pt.conf
          sudo ln -sf /etc/nginx/sites-available/produtividade-staging.planapp.gov.pt.conf /etc/nginx/sites-enabled/
          sudo nginx -t && sudo systemctl reload nginx

      - name: Healthcheck
        run: |
          sleep 10
          curl -sf "${{ env.HEALTHCHECK_URL }}" || exit 1
